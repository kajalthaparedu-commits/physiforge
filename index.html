<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<title>PhysiForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* (your entire CSS unchanged — keep as is) */
</style>

</head>

<body>

<div id="ui">
  
<!-- TITLE SCREEN -->
<div id="titleScreen" class="ui-panel" role="button">

<div id="titleContainer">
<div id="orbitRing"></div>
<div id="satellite"></div>
<div id="title">PHYSIFORGE</div>
</div>

<div id="subtitle">
An open platform for interactive physics exploration
</div>

<div id="startText">Click anywhere to begin</div>

</div>

<!-- HEADER -->
<div id="header" class="ui-panel">
<div id="headerTitle">PHYSIFORGE</div>
</div>

<!-- WORLD HUB -->
<div id="worldHub" class="ui-panel">

<div class="grid">

<div class="world" onclick="loadWorld('electrostatics')">Electrostatics</div>
<div class="world" onclick="loadWorld('modernPhysics')">Modern Physics</div>

</div>

</div>

<!-- FOOTER -->
<div id="PhysiForgeFooter">
© 2026 <strong>PhysiForge</strong><br>
Conceptualised and created by 
<strong><span style="color:#7ecbff">Kajal Thapar</span></strong><br>
Developed with AI-assisted tools
</div>

</div>

<script>

/* TITLE CLICK LOGIC (unchanged) */

const music = new Audio("./assets/sound/PhysiForge-theme.mp3")
const titleScreen = document.getElementById("titleScreen")
const header = document.getElementById("header")
const worldHub = document.getElementById("worldHub")

titleScreen.onclick = () => {

music.play().catch(()=>{})

titleScreen.style.opacity = 0

setTimeout(() => {
titleScreen.style.display = "none"
header.style.display = "block"
worldHub.style.display = "block"
setTimeout(()=> worldHub.style.opacity = 1, 50)
}, 900)

}

</script>

<!-- IMPORTANT: only main.js handles loadWorld -->
<script type="module" src="./src/main.js"></script>

</body>
</html>
